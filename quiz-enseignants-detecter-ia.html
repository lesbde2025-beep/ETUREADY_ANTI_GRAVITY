<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Enseignants : Savez-vous repérer ChatGPT ? - EtuReady</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-quiz {
            display: block;
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-quiz:hover {
            border-color: #7209b7;
            background: #f3e5f5;
        }
    </style>
</head>

<body class="theme-purple">
    <site-header></site-header>
    <main class="container" style="padding-top: 4rem;">
        <div class="quiz-container">
            <h1 style="text-align:center; color: #7209b7; margin-bottom:2rem;">Savez-vous repérer ChatGPT ? 🤖</h1>
            <div id="quiz-area"></div>
            <div id="result-area" style="display:none; text-align:center;"></div>
        </div>
    </main>
    <script>
        const qs = [
            {
                t: "Un devoir contient la phrase 'En conclusion, il est important de noter que...'.", o: [
                    { t: "C'est une belle plume.", s: 0 },
                    { t: "C'est suspect, très typique de l'IA.", s: 1 },
                    { t: "C'est une phrase standard.", s: 0 }
                ]
            },
            {
                t: "L'étudiant cite un auteur très pointu mais l'analyse est superficielle.", o: [
                    { t: "Il a mal compris le texte.", s: 0 },
                    { t: "Hallucination d'IA probable.", s: 1 }
                ]
            },
            {
                t: "Il n'y a aucune faute d'orthographe dans un devoir de 10 pages.", o: [
                    { t: "Quel progrès !", s: 0 },
                    { t: "Suspect, même les meilleurs en font.", s: 1 }
                ]
            },
            {
                t: "Le plan est : I. Avantages, II. Inconvénients, III. Impact sociétal (très lisse).", o: [
                    { t: "Classique ChatGPT.", s: 1 },
                    { t: "C'est la méthode enseignée.", s: 0 }
                ]
            }
        ];
        let c = 0, s = 0;
        function l() {
            if (c >= 4) {
                document.getElementById('quiz-area').style.display = 'none';
                let d = document.getElementById('result-area');
                d.style.display = 'block';
                let t = "", m = "";
                if (s < 2) { t = "Naïf 😇"; m = "Attention, vous corrigez probablement des robots sans le savoir !"; }
                else if (s < 4) { t = "Vigilant 🧐"; m = "Vous avez l'œil, mais les IA progressent vite."; }
                else { t = "Blade Runner 🕵️"; m = "Rien ne vous échappe. Vous savez distinguer l'humain de la machine."; }
                d.innerHTML = `<h2 style="color:#7209b7;">${s}/4 - ${t}</h2><p style="font-size:1.2rem; margin:2rem 0;">${m}</p><a href="/enseignants.html" class="btn-theme">Retour</a>`;
                return;
            }
            let h = `<h3>${qs[c].t}</h3>`;
            qs[c].o.forEach(x => h += `<button class="btn-quiz" onclick='s+=${x.s};c++;l()'>${x.t}</button>`);
            document.getElementById('quiz-area').innerHTML = h;
        }
        l();
    </script>
</body>

</html>
