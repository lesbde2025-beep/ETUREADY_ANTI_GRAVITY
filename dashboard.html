<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/public/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mon Tableau de Bord - EtuReady</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <link rel="stylesheet" href="/src/style-auth.css">
</head>

<body>
    <site-header></site-header>

    <main class="container" style="padding: 4rem 0;">
        <div
            style="background: white; padding: 3rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); border: 1px solid var(--border-light);">
            <div style="display: flex; align-items: center; gap: 1.5rem; margin-bottom: 3rem;">
                <div style="width: 80px; height: 80px; background: var(--secondary-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; color: white; font-weight: bold;"
                    id="user-avatar-lg">
                    👋
                </div>
                <div>
                    <h1 style="margin: 0; font-size: 2rem; color: var(--primary-color);">Bonjour, <span
                            id="user-name-display">Étudiant</span> !</h1>
                    <p style="color: var(--text-secondary); margin-top: 0.5rem;">C'est un plaisir de vous revoir.</p>
                </div>
            </div>

            <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem;">
                <div class="card" style="padding: 2rem; border-left: 4px solid var(--theme-blue);">
                    <h3 style="margin-bottom: 1rem;">📅 Mon Agenda</h3>
                    <p style="color: #666; font-size: 0.95rem;">Aucun événement prévu aujourd'hui.</p>
                    <a href="/evenement.html"
                        style="font-weight: 600; color: var(--theme-blue); display: inline-block; margin-top: 1rem;">Voir
                        le calendrier →</a>
                </div>

                <div class="card" style="padding: 2rem; border-left: 4px solid var(--secondary-color);">
                    <h3 style="margin-bottom: 1rem;">🔖 Mes Favoris</h3>
                    <p style="color: #666; font-size: 0.95rem;">Retrouvez vos articles et bons plans sauvegardés.</p>
                    <a href="/bons-plans.html"
                        style="font-weight: 600; color: var(--secondary-color); display: inline-block; margin-top: 1rem;">Explorer
                        les offres →</a>
                </div>

                <div class="card" style="padding: 2rem; border-left: 4px solid var(--theme-purple);">
                    <h3 style="margin-bottom: 1rem;">⚙️ Paramètres</h3>
                    <p style="color: #666; font-size: 0.95rem;">Gérer vos informations personnelles.</p>
                    <a href="javascript:void(0)"
                        style="font-weight: 600; color: var(--theme-purple); display: inline-block; margin-top: 1rem;">Modifier
                        mon profil →</a>
                </div>
            </div>

            <div style="margin-top: 4rem; text-align: center;">
                <button id="logout-btn-dash"
                    style="background: var(--bg-body); color: var(--theme-red); border: 1px solid #e2e8f0; padding: 0.8rem 2rem; border-radius: 50px; cursor: pointer; font-weight: 600; transition: all 0.2s;">
                    Se déconnecter
                </button>
            </div>
        </div>
    </main>

    <script type="module" src="/src/main.js"></script>
    <script type="module">
        import { authService } from '/src/auth-service.js';

        (async () => {
            const user = await authService.getCurrentUser();
            if (!user) {
                window.location.href = '/connexion.html';
                return;
            }

            const meta = user.user_metadata || {};
            const prenom = meta.prenom || 'Étudiant';

            document.getElementById('user-name-display').textContent = prenom;
            document.getElementById('user-avatar-lg').textContent = prenom.charAt(0).toUpperCase();

            document.getElementById('logout-btn-dash').addEventListener('click', async () => {
                await authService.signOut();
                window.location.href = '/';
            });
        })();
    </script>
</body>

</html>
