<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/public/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - EtuReady</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>

<body>
    <!-- Header -->
            <site-header></site-header>

    <header class="hero" style="background: linear-gradient(135deg, #333, #000);">
        <div class="container">
            <h1>Contactez-nous</h1>
            <p>Une question ? Une suggestion ? Écrivez-nous !</p>
        </div>
    </header>

    <main class="container article-content">
        <div style="max-width: 600px; margin: 0 auto;">
            <form style="display: flex; flex-direction: column; gap: 1rem;">
                <div>
                    <label for="name" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Nom
                        complet</label>
                    <input type="text" id="name"
                        style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                <div>
                    <label for="email" style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Email</label>
                    <input type="email" id="email"
                        style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px;">
                </div>
                <div>
                    <label for="message"
                        style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Message</label>
                    <textarea id="message" rows="5"
                        style="width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 8px;"></textarea>
                </div>
                <button type="submit" class="btn" style="align-self: flex-start;">Envoyer</button>
            </form>
        </div>
    </main>

    <site-footer></site-footer>
    <script type="module" src="/src/main.js"></script>
</body>

</html>
