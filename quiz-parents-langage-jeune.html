<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Parents : Langage Jeune - EtuReady</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-quiz {
            display: block;
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-quiz:hover {
            border-color: #fb8500;
            background: #fff8e1;
        }
    </style>
</head>

<body class="theme-yellow">
    <site-header></site-header>
    <main class="container" style="padding-top: 4rem;">
        <div class="quiz-container">
            <h1 style="text-align:center; color: #fb8500; margin-bottom:2rem;">Parlez-vous le "Jeune" ? 🗣️</h1>
            <div id="quiz-area"></div>
            <div id="result-area" style="display:none; text-align:center;"></div>
        </div>
    </main>
    <script>
        const qs = [
            {
                t: "Si votre enfant dit 'Ce prof, c'est un banger', il veut dire...", o: [
                    { t: "Ce prof est un idiot.", s: 0 },
                    { t: "Ce prof est génial / incroyable.", s: 20 },
                    { t: "Ce prof fait peur.", s: 0 }
                ]
            },
            {
                t: "Traduction de 'J'ai trop le seum' :", o: [
                    { t: "Je suis dégoûté / triste / énervé.", s: 20 },
                    { t: "J'ai trop faim.", s: 0 },
                    { t: "Je suis super content.", s: 0 }
                ]
            },
            {
                t: "C'est quoi un 'Red Flag' ?", o: [
                    { t: "Une alerte incendie.", s: 0 },
                    { t: "Un signal d'alarme / un comportement toxique à éviter.", s: 20 },
                    { t: "Un nouveau réseau social.", s: 0 }
                ]
            },
            {
                t: "S'il dit 'C'est carré' :", o: [
                    { t: "C'est parfait, c'est validé.", s: 20 },
                    { t: "C'est ennuyeux, rigide.", s: 0 },
                    { t: "C'est géométrique.", s: 0 }
                ]
            },
            {
                t: "Que signifie 'Glow Up' ?", o: [
                    { t: "Se lever tôt.", s: 0 },
                    { t: "Une transformation physique positive / embellissement.", s: 20 },
                    { t: "Une fête fluorescente.", s: 0 }
                ]
            }
        ];
        let c = 0, s = 0;
        function l() {
            if (c >= 5) {
                document.getElementById('quiz-area').style.display = 'none';
                let d = document.getElementById('result-area');
                d.style.display = 'block';
                let t = "", m = "";
                if (s < 40) { t = "Boomer Confirmé 👴"; m = "Oula... Vous avez besoin d'un dictionnaire 2024 d'urgence."; }
                else if (s < 80) { t = "Dans le coup (presque) 😉"; m = "Pas mal ! Vous comprenez l'essentiel, mais attention aux faux-amis."; }
                else { t = "Validé par la Street 😎"; m = "Incroyable ! Vous parlez couramment le Gen Z. C'est carré."; }
                d.innerHTML = `<h2 style="color:#fb8500;">${s}% - ${t}</h2><p style="font-size:1.2rem; margin:2rem 0;">${m}</p><a href="/parents.html" class="btn-theme">Retour</a>`;
                return;
            }
            let h = `<h3>${qs[c].t}</h3>`;
            qs[c].o.forEach(x => h += `<button class="btn-quiz" onclick='s+=${x.s};c++;l()'>${x.t}</button>`);
            document.getElementById('quiz-area').innerHTML = h;
        }
        l();
    </script>
</body>

</html>
