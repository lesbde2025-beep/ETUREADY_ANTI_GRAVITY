<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Enseignants : Vos cours sont-ils Gen Z Friendly ? - EtuReady</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-quiz {
            display: block;
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-quiz:hover {
            border-color: #7209b7;
            background: #f3e5f5;
        }
    </style>
</head>

<body class="theme-purple">
    <site-header></site-header>
    <main class="container" style="padding-top: 4rem;">
        <div class="quiz-container">
            <h1 style="text-align:center; color: #7209b7; margin-bottom:2rem;">Vos cours matchent-ils avec la Gen Z ? ⚡
            </h1>
            <div id="quiz-area"></div>
            <div id="result-area" style="display:none; text-align:center;"></div>
        </div>
    </main>
    <script>
        const qs = [
            {
                t: "La durée idéale d'une séquence de cours sans pause/interaction ?", o: [
                    { t: "2h magistrales.", s: 0 },
                    { t: "45 minutes.", s: 10 },
                    { t: "15-20 minutes max.", s: 20 }
                ]
            },
            {
                t: "Pour expliquer un concept complexe, vous utilisez...", o: [
                    { t: "Une définition académique précise.", s: 5 },
                    { t: "Un mème ou une référence pop culture.", s: 20 },
                    { t: "Un schéma au tableau.", s: 10 }
                ]
            },
            {
                t: "Le format de rendu préféré des étudiants ?", o: [
                    { t: "La dissertation manuscrite.", s: 0 },
                    { t: "Le dossier Word de 20 pages.", s: 5 },
                    { t: "La vidéo TikTok ou le Pitch oral.", s: 20 }
                ]
            },
            {
                t: "Comment gérez-vous les feedbacks ?", o: [
                    { t: "J'attends l'évaluation de fin d'année.", s: 0 },
                    { t: "Je demande à la fin du cours oralement.", s: 10 },
                    { t: "QR Code anonyme en direct.", s: 20 }
                ]
            }
        ];
        let c = 0, s = 0;
        function l() {
            if (c >= 4) {
                document.getElementById('quiz-area').style.display = 'none';
                let d = document.getElementById('result-area');
                d.style.display = 'block';
                let t = "", m = "";
                if (s < 40) { t = "Old School 📜"; m = "Vos méthodes sont solides mais peut-être un peu austères pour 2024. Osez l'interactif !"; }
                else if (s < 70) { t = "En transition 🔄"; m = "Vous faites des efforts pour vous adapter. Continuez, vous êtes sur la bonne voie."; }
                else { t = "Prof Influenceur 🌟"; m = "Vos étudiants vous adorent. Vous parlez leur langue tout en transmettant le savoir."; }
                d.innerHTML = `<h2 style="color:#7209b7;">${s}% - ${t}</h2><p style="font-size:1.2rem; margin:2rem 0;">${m}</p><a href="/enseignants.html" class="btn-theme">Retour</a>`;
                return;
            }
            let h = `<h3>${qs[c].t}</h3>`;
            qs[c].o.forEach(x => h += `<button class="btn-quiz" onclick='s+=${x.s};c++;l()'>${x.t}</button>`);
            document.getElementById('quiz-area').innerHTML = h;
        }
        l();
    </script>
</body>

</html>
