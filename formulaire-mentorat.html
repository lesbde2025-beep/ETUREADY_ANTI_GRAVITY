<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <title>Devenir Mentor - EtuReady</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>

<body class="theme-orange">
    <site-header></site-header>
    <main class="container" style="padding-top: 4rem; max-width:600px;">
        <h1>Rejoindre le programme Mentorat</h1>
        <p>Aidez un étudiant à construire son projet professionnel.</p>
        <form style="display:flex; flex-direction:column; gap:1rem; margin-top:2rem;">
            <input type="text" placeholder="Nom Prénom" style="padding:1rem; border-radius:8px; border:1px solid #ddd;">
            <input type="email" placeholder="Email" style="padding:1rem; border-radius:8px; border:1px solid #ddd;">
            <input type="text" placeholder="Entreprise actuelle"
                style="padding:1rem; border-radius:8px; border:1px solid #ddd;">
            <button class="btn btn-primary" style="background:var(--theme-orange);">Je m'inscris</button>
        </form>
    </main>
</body>

</html>
