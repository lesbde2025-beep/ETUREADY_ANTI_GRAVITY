<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <title>Intervenir à l'école - EtuReady</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
</head>

<body class="theme-orange">
    <site-header></site-header>
    <main class="container" style="padding-top: 4rem; max-width:600px;">
        <h1>Proposer une intervention</h1>
        <p>Jury, cours ou conférence : partagez votre expertise.</p>
        <form style="display:flex; flex-direction:column; gap:1rem; margin-top:2rem;">
            <input type="text" placeholder="Sujet d'intervention"
                style="padding:1rem; border-radius:8px; border:1px solid #ddd;">
            <textarea placeholder="Description"
                style="padding:1rem; border-radius:8px; border:1px solid #ddd; height:100px;"></textarea>
            <button class="btn btn-primary" style="background:var(--theme-orange);">Envoyer ma proposition</button>
        </form>
    </main>
</body>

</html>
