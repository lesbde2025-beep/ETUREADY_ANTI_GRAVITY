<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Personnel : Gestion du stress - EtuReady</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-quiz {
            display: block;
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-quiz:hover {
            border-color: #38b0ac;
            background: #e6fffa;
        }
    </style>
</head>

<body class="theme-green">
    <site-header></site-header>
    <main class="container" style="padding-top: 4rem;">
        <div class="quiz-container">
            <h1 style="text-align:center; color: #38b0ac; margin-bottom:2rem;">Niveau de Zenitude au Bureau 🧘‍♀️</h1>
            <div id="quiz-area"></div>
            <div id="result-area" style="display:none; text-align:center;"></div>
        </div>
    </main>
    <script>
        const qs = [
            {
                t: "La pause déjeuner, c'est...", o: [
                    { t: "Un sandwich devant l'écran en traitant les mails.", s: 0 },
                    { t: "1h complète à l'extérieur ou avec les collègues.", s: 20 },
                    { t: "30 minutes si j'ai le temps.", s: 10 }
                ]
            },
            {
                t: "Consultez-vous vos mails pro le soir/weekend ?", o: [
                    { t: "Jamais, déconnexion totale.", s: 20 },
                    { t: "Parfois, juste pour vérifier.", s: 10 },
                    { t: "Tout le temps, j'ai peur de rater un truc.", s: 0 }
                ]
            },
            {
                t: "Un étudiant agressif au guichet...", o: [
                    { t: "Ça me mine le moral pour la journée.", s: 0 },
                    { t: "Je prends du recul, ce n'est pas contre moi.", s: 20 }
                ]
            }
        ];
        let c = 0, s = 0;
        function l() {
            if (c >= 3) {
                document.getElementById('quiz-area').style.display = 'none';
                let d = document.getElementById('result-area');
                d.style.display = 'block';
                let t = "", m = "";
                if (s < 30) { t = "Au bord de la rupture 🤯"; m = "Attention ! Vous ne prenez pas assez soin de vous. Le burn-out guette. Ralentissez."; }
                else if (s < 50) { t = "Sous Tension ⚡"; m = "Vous tenez le coup, mais la fatigue s'accumule. Essayez de mieux déconnecter."; }
                else { t = "Maître Zen 🎋"; m = "Bravo ! Vous avez trouvé l'équilibre parfait. Vous gérez le stress comme un pro."; }
                d.innerHTML = `<h2 style="color:#38b0ac;">${t}</h2><p style="font-size:1.2rem; margin:2rem 0;">${m}</p><a href="/personnel-administratif.html" class="btn-theme">Retour</a>`;
                return;
            }
            let h = `<h3>${qs[c].t}</h3>`;
            qs[c].o.forEach(x => h += `<button class="btn-quiz" onclick='s+=${x.s};c++;l()'>${x.t}</button>`);
            document.getElementById('quiz-area').innerHTML = h;
        }
        l();
    </script>
</body>

</html>
