<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz Personnel : Êtes-vous incollable sur l'administration ? - EtuReady</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .btn-quiz {
            display: block;
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        .btn-quiz:hover {
            border-color: #38b0ac;
            background: #e6fffa;
        }
    </style>
</head>

<body class="theme-green">
    <site-header></site-header>
    <main class="container" style="padding-top: 4rem;">
        <div class="quiz-container">
            <h1 style="text-align:center; color: #38b0ac; margin-bottom:2rem;">Expert de l'Enseignement Sup' ? 🎓</h1>
            <div id="quiz-area"></div>
            <div id="result-area" style="display:none; text-align:center;"></div>
        </div>
    </main>
    <script>
        const qs = [
            {
                t: "Que signifie CVEC ?", o: [
                    { t: "Contribution de Vie Étudiante et de Campus.", s: 1 },
                    { t: "Centre de Validation des Examens et Concours.", s: 0 },
                    { t: "Certificat de Vie en Cité.", s: 0 }
                ]
            },
            {
                t: "Combien de crédits ECTS pour valider une Licence ?", o: [
                    { t: "120.", s: 0 },
                    { t: "180.", s: 1 },
                    { t: "300.", s: 0 }
                ]
            },
            {
                t: "La portabilité des droits DIF/CPF concerne...", o: [
                    { t: "Uniquement le privé.", s: 0 },
                    { t: "Tous les salariés (public et privé).", s: 1 }
                ]
            }
        ];
        let c = 0, s = 0;
        function l() {
            if (c >= 3) {
                document.getElementById('quiz-area').style.display = 'none';
                let d = document.getElementById('result-area');
                d.style.display = 'block';
                let t = "", m = "";
                if (s < 2) { t = "En apprentissage 📘"; m = "Vous connaissez les bases, mais quelques révisions ne feraient pas de mal."; }
                else { t = "Expert Confirmé 🏆"; m = "Bravo ! Les acronymes n'ont aucun secret pour vous."; }
                d.innerHTML = `<h2 style="color:#38b0ac;">${s}/3 - ${t}</h2><p style="font-size:1.2rem; margin:2rem 0;">${m}</p><a href="/personnel-administratif.html" class="btn-theme">Retour</a>`;
                return;
            }
            let h = `<h3>${qs[c].t}</h3>`;
            qs[c].o.forEach(x => h += `<button class="btn-quiz" onclick='s+=${x.s};c++;l()'>${x.t}</button>`);
            document.getElementById('quiz-area').innerHTML = h;
        }
        l();
    </script>
</body>

</html>
